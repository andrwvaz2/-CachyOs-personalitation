# CONFIGURACIÓN HYPRLAND - ESTILO CIAN/PÚRPURA NEÓN

# Monitores
monitor=,preferred,auto,auto

# Autostart
exec-once = swww init && swww img "$HOME/.config/hypr/wallpapers/default.jpg"
exec-once = ~/.config/waybar/launch_waybar.sh

# Variables de entorno
env = XCURSOR_SIZE,24

input {
    kb_layout = es
    follow_mouse = 1
}

general {
    gaps_in = 5
    gaps_out = 15
    border_size = 3
    
    # Colores Cian y Púrpura Neón
    col.active_border = rgba(00ffffff) rgba(ff00ffff) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

decoration {
    rounding = 12
    
    # Efecto de brillo (Glow)
    drop_shadow = yes
    shadow_range = 25
    shadow_render_power = 4
    col.shadow = rgba(00ffff66) # Brillo Cian tenue
    
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

# Atajos de teclado básicos
$mainMod = SUPER

bind = $mainMod, Q, exec, ghostty || kitty
bind = $mainMod, C, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, E, exec, dolphin
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, wofi --show drun
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Mover foco
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Cambiar de espacio de trabajo
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3

# Mover ventana a espacio de trabajo
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
